image: alpine:latest

before_script:
  - apk add --no-cache clang clang-extra-tools

stages:
  - check-format
  - build

check-format:
  stage: check-format
  script:
    - find . -type f -name "*.c" -o -type f -name "*.h" | xargs clang-format --style=GNU -i --verbose
    - git diff --exit-code
 
build:
  stage: build
  script:
    - make